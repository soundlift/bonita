name: Release Version

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'backend/bonita/__init__.py'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: extract_version
        run: |
          VERSION=$(grep -oP '__version__ = "\K[^"]+' backend/bonita/__init__.py)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Found version: $VERSION"

      - name: Determine release type
        id: release_type
        run: |
          if [ "${{ github.ref_name }}" = "dev" ]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "tag_name=v${{ steps.extract_version.outputs.version }}-dev" >> $GITHUB_OUTPUT
            echo "release_name=Dev v${{ steps.extract_version.outputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "tag_name=v${{ steps.extract_version.outputs.version }}" >> $GITHUB_OUTPUT
            echo "release_name=Release v${{ steps.extract_version.outputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_type.outputs.tag_name }}
          name: ${{ steps.release_type.outputs.release_name }}
          draft: false
          prerelease: ${{ steps.release_type.outputs.prerelease }}

  docker:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: extract_version
        run: |
          VERSION=$(grep -oP '__version__ = "\K[^"]+' backend/bonita/__init__.py)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/bonita:${{ github.ref_name == 'main' && 'latest' || 'dev' }}
            ghcr.io/${{ github.repository_owner }}/bonita:${{ steps.extract_version.outputs.version }}${{ github.ref_name == 'dev' && '-dev' || '' }}
